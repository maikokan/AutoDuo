name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build tarball
        run: |
          mkdir -p autoduo-${{ github.ref_name }}
          rsync -a --exclude='.venv' --exclude='__pycache__' \
            --exclude='*.log' --exclude='.pytest_cache' \
            --exclude='.slim' --exclude='data' \
            ./ autoduo-${{ github.ref_name }}/
          tar czf autoduo-${{ github.ref_name }}.tar.gz autoduo-${{ github.ref_name }}/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: autoduo-${{ github.ref_name }}.tar.gz
          generate_release_notes: true